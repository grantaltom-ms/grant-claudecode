<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milestone Financial Agent</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f1117;
    color: #e4e4e7;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 16px 24px;
    border-bottom: 1px solid #27272a;
    background: #18181b;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    color: #fafafa;
  }

  header .dot {
    width: 8px; height: 8px;
    background: #22c55e;
    border-radius: 50%;
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .msg {
    max-width: 780px;
    width: 100%;
    margin: 0 auto;
    line-height: 1.6;
  }

  .msg.user {
    background: #27272a;
    padding: 12px 16px;
    border-radius: 12px;
    align-self: flex-end;
  }

  .msg.assistant {
    padding: 4px 0;
  }

  .msg.assistant p { margin-bottom: 8px; }
  .msg.assistant p:last-child { margin-bottom: 0; }

  .msg.assistant table {
    border-collapse: collapse;
    width: 100%;
    margin: 8px 0;
    font-size: 14px;
  }

  .msg.assistant th, .msg.assistant td {
    border: 1px solid #3f3f46;
    padding: 6px 10px;
    text-align: left;
  }

  .msg.assistant th { background: #27272a; font-weight: 600; }

  .msg.assistant code {
    background: #27272a;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
  }

  .msg.assistant pre {
    background: #1e1e22;
    border: 1px solid #3f3f46;
    border-radius: 8px;
    padding: 12px;
    overflow-x: auto;
    margin: 8px 0;
  }

  .msg.assistant pre code {
    background: none;
    padding: 0;
  }

  .tool-indicator {
    max-width: 780px;
    width: 100%;
    margin: 0 auto;
    font-size: 13px;
    color: #a1a1aa;
    padding: 6px 12px;
    background: #1c1c20;
    border-radius: 8px;
    border: 1px solid #27272a;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .tool-indicator .spinner {
    width: 14px; height: 14px;
    border: 2px solid #3f3f46;
    border-top-color: #a78bfa;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #input-area {
    padding: 16px 24px;
    border-top: 1px solid #27272a;
    background: #18181b;
  }

  #input-wrap {
    max-width: 780px;
    margin: 0 auto;
    display: flex;
    gap: 8px;
  }

  #input {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid #3f3f46;
    border-radius: 10px;
    background: #27272a;
    color: #fafafa;
    font-size: 15px;
    outline: none;
    font-family: inherit;
    resize: none;
    min-height: 44px;
    max-height: 120px;
  }

  #input:focus { border-color: #a78bfa; }
  #input::placeholder { color: #71717a; }

  #send {
    padding: 0 20px;
    background: #7c3aed;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
  }

  #send:hover { background: #6d28d9; }
  #send:disabled { opacity: 0.5; cursor: not-allowed; }

  .welcome {
    max-width: 780px;
    width: 100%;
    margin: auto;
    text-align: center;
    color: #71717a;
  }

  .welcome h2 { color: #a1a1aa; margin-bottom: 8px; font-size: 20px; }
  .welcome p { font-size: 14px; line-height: 1.6; }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 16px;
  }

  .suggestions button {
    padding: 8px 14px;
    background: #27272a;
    border: 1px solid #3f3f46;
    border-radius: 8px;
    color: #a1a1aa;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }

  .suggestions button:hover { border-color: #a78bfa; color: #e4e4e7; }
</style>
</head>
<body>
<header>
  <div class="dot"></div>
  <h1>Milestone Financial Agent</h1>
</header>

<div id="chat">
  <div class="welcome">
    <h2>Milestone Properties Financial Assistant</h2>
    <p>Ask me anything about your property portfolio — income, expenses, NOI, balance sheets, GL transactions, and more.</p>
    <div class="suggestions">
      <button onclick="askSuggestion(this)">What's the portfolio NOI by year?</button>
      <button onclick="askSuggestion(this)">Top 5 properties by NOI in 2025</button>
      <button onclick="askSuggestion(this)">Show Castle's expense breakdown for 2025</button>
      <button onclick="askSuggestion(this)">Draft an email to Conor about uploading the March GL export</button>
    </div>
  </div>
</div>

<div id="input-area">
  <div id="input-wrap">
    <textarea id="input" placeholder="Ask about your properties..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
    <button id="send" onclick="send()">Send</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');
let messages = [];
let busy = false;

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

function askSuggestion(btn) {
  inputEl.value = btn.textContent;
  send();
}

function addMessage(role, html) {
  // Remove welcome if present
  const welcome = chatEl.querySelector('.welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = html;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

function addToolIndicator(label) {
  const div = document.createElement('div');
  div.className = 'tool-indicator';
  div.innerHTML = `<div class="spinner"></div><span>${label}</span>`;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

async function send() {
  const text = inputEl.value.trim();
  if (!text || busy) return;

  busy = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  inputEl.style.height = 'auto';

  addMessage('user', escapeHtml(text));
  messages.push({ role: 'user', content: text });

  let assistantText = '';
  let assistantEl = null;
  let toolEl = null;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = JSON.parse(line.slice(6));

        if (data.type === 'tool_call') {
          toolEl = addToolIndicator(data.indicator || 'Working...');
        } else if (data.type === 'text') {
          if (toolEl) { toolEl.remove(); toolEl = null; }
          assistantText += data.content;
          if (!assistantEl) {
            assistantEl = addMessage('assistant', '');
          }
          assistantEl.innerHTML = marked.parse(assistantText);
          chatEl.scrollTop = chatEl.scrollHeight;
        } else if (data.type === 'done') {
          if (toolEl) { toolEl.remove(); toolEl = null; }
        }
      }
    }
  } catch (err) {
    addMessage('assistant', `<p style="color:#ef4444">Error: ${escapeHtml(err.message)}</p>`);
  }

  if (assistantText) {
    messages.push({ role: 'assistant', content: assistantText });
  }

  busy = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
